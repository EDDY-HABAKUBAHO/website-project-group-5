<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>    
    <title>Website project template</title>
</head>

<body>
  <div id="header"></div>
  <div id="hero"></div>
  <div id="contact"></div>
  <div id="footer"></div>

  <script>
    const loadComponents = (id, url) => {
      return fetch(url)
        .then((response) => response.text())
        .then((html) => {
          document.getElementById(id).innerHTML = html;
        });
    };

    window.onload = async () => {
      loadComponents('header', 'src/sections/header.html');
      loadComponents('hero', 'src/sections/hero.html');
      loadComponents('contact', 'src/sections/contact.html');
      loadComponents('footer', 'src/sections/footer.html');

      
      window.toggleMenu = function () {
        const menu = document.querySelector('.menu-mobile');
        const hamburger = document.querySelector('.hamburger');
        const cross = document.querySelector('.cross');
        const heroDescription = document.querySelector('.heroDesc')

        const isHidden = menu.classList.contains('hidden');

        if (isHidden) {
          menu.classList.remove('hidden');
          hamburger.classList.add('hidden');
          cross.classList.remove('hidden');
          heroDescription.classList.add('hidden');
        } else {
          menu.classList.add('hidden');
          cross.classList.add('hidden');
          heroDescription.classList.remove('hidden');
          hamburger.classList.remove('hidden');
        }
      };
    };
  </script>
</body>
</html>
