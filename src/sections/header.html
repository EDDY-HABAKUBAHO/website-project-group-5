<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navbar</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer>
    function toggleMenu() {
      const menu = document.querySelector('.menu-mobile');
      const hamburger = document.querySelector('.hamburger');
      const cross= document.querySelector('.cross');


      const isHidden = menu.classList.contains('hidden');

      if (isHidden) {
        menu.classList.remove('hidden');
        hamburger.classList.add('hidden');
        cross.classList.remove('hidden');
      } else {
        menu.classList.add('hidden');
        cross.classList.add("hidden");
        hamburger.classList.remove('hidden');
      }
    }
  </script>
</head>
<body class="">

  <!-- Navbar wrapper -->
  <div class="flex justify-between mx-5 mt-5 items-center">
    
    <!-- Language -->
    <div>
      <p>DE</p>
      <p>EN</p>
    </div>

    <!--  Brand -->
    <div class="font-bold text-2xl">Baumeister</div>

    <!-- Desktop menu -->
    <ul class="hidden lg:block space-y-2">
      <li>About</li>
      <li>Service</li>
      <li>Reference</li>
      <li>Contact</li>
    </ul>

    <!-- Hamburger icon (small screens only) -->
    <div class="lg:hidden">
      <img src="./hamburgerMenu.png" onclick="toggleMenu()" alt="hamburgerMenu" class="hamburger w-8 cursor-pointer">
      <img src="./crossIcon.png" onclick= "toggleMenu()"alt="crossIcon" class="cross hidden w-8 cursor-pointer">
    </div>
  </div>


  <ul class="menu-mobile hidden fixed text-center mx-auto w-full space-y-4 text-xl bg-white p-6 rounded  z-50 lg:hidden">
    <li onclick="toggleMenu()">About</li>
    <li onclick="toggleMenu()">Service</li>
    <li onclick="toggleMenu()">Reference</li>
    <li onclick="toggleMenu()">Contact</li>
  </ul>

</body>
</html>
